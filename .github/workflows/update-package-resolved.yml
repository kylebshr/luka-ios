name: Update Package.resolved

on:
  push:
    branches:
      - claude/dexcomkit-luka-prototype-37ulik

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve and commit Package.resolved
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -project Luka.xcodeproj \
            -scheme Luka \
            -resolvePackageDependencies

      - name: Upload resolved file
        uses: actions/upload-artifact@v4
        with:
          name: package-resolved
          path: Luka.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Commit updated Package.resolved
        run: |
          FILE=Luka.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          if git diff --quiet -- "$FILE"; then
            echo "Package.resolved unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Update Package.resolved with DexcomKit pin"
          git push
